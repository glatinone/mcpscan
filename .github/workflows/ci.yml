name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Dogfood — scan our own source (must be clean)
        run: mcpscan . --min-severity low
      - name: Self-scan clean fixture (must pass with exit 0)
        run: mcpscan tests/fixtures/clean --min-severity low
      - name: Scan vulnerable fixture (must fail with findings)
        run: |
          if mcpscan tests/fixtures/vulnerable --min-severity high; then
            echo "expected non-zero exit on vulnerable fixture" && exit 1
          fi
