# Publish to PyPI on tag push, using PyPI Trusted Publishing (OIDC) — no API token.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   Project name:        mcpscan
#   Owner:               glatinone
#   Repository name:     mcpscan
#   Workflow filename:   release.yml
#   Environment name:    pypi
#
# Then: copy this file to .github/workflows/release.yml and push a tag (e.g. v0.2.1).
name: release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
